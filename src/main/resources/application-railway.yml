# ============================================================
# Endorsement Service - Railway Deployment Profile
# ============================================================
# Activated via SPRING_PROFILES_ACTIVE=railway on Railway.
# All values are injected from Railway service variables using
# reference variables (${{Postgres.DATABASE_URL}}, etc.).
# ============================================================

spring:
  # --- DataSource (Railway PostgreSQL + HikariCP) ---
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1680000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # --- Redis (Railway Redis) ---
  data:
    redis:
      url: ${REDIS_URL}

  # --- Kafka (Railway Kafka via private networking) ---
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}

  # --- Flyway ---
  flyway:
    enabled: true

# --- Ollama (opt-in via OLLAMA_ENABLED=true) ---
endorsement:
  intelligence:
    ollama:
      enabled: ${OLLAMA_ENABLED:false}

# --- Server ---
# Railway injects PORT; Spring Boot reads SERVER_PORT or server.port
server:
  port: ${PORT:8080}
  shutdown: graceful

# --- Logging (production-safe) ---
logging:
  level:
    root: INFO
    com.plum: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN

# --- Management / Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
