# ============================================================
# Behaviour Tests Profile
# Uses Testcontainers for PostgreSQL, Redis, Kafka
# DataSource, Redis, and Kafka URLs are injected via
# @DynamicPropertySource in CucumberSpringConfig
# ============================================================

spring:
  ai:
    model:
      chat: none

  application:
    name: endorsement-service-bdd

  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10s

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health

endorsement:
  intelligence:
    ollama:
      enabled: false
  batch:
    schedule-cron: "-"
  retry:
    max-attempts: 3
    backoff-ms: 100
  provisional-coverage:
    max-days: 30

logging:
  level:
    root: WARN
    com.plum: DEBUG
    org.springframework.test: WARN
    org.testcontainers: INFO
    io.cucumber: WARN
