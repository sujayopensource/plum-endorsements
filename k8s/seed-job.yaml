apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: plum
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: seed-data
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:16-alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: endorsements
            - name: PGUSER
              value: plum
            - name: PGPASSWORD
              value: plum_dev
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Flyway migrations (ea_accounts table)..."
              RETRIES=0
              MAX_RETRIES=60
              until psql -c "SELECT 1 FROM ea_accounts LIMIT 0" 2>/dev/null; do
                RETRIES=$((RETRIES + 1))
                if [ $RETRIES -ge $MAX_RETRIES ]; then
                  echo "Timed out waiting for ea_accounts table"
                  exit 1
                fi
                echo "  Table not ready yet, retrying ($RETRIES/$MAX_RETRIES)..."
                sleep 3
              done
              echo "Table ready. Seeding demo EA accounts for multi-insurer setup..."
              psql <<SQL
              INSERT INTO ea_accounts (employer_id, insurer_id, balance, reserved, updated_at)
              VALUES
                ('11111111-1111-1111-1111-111111111111', '22222222-2222-2222-2222-222222222222', 500000.00, 0.00, now()),
                ('11111111-1111-1111-1111-111111111111', '33333333-3333-3333-3333-333333333333', 500000.00, 0.00, now()),
                ('11111111-1111-1111-1111-111111111111', '44444444-4444-4444-4444-444444444444', 500000.00, 0.00, now()),
                ('11111111-1111-1111-1111-111111111111', '55555555-5555-5555-5555-555555555555', 500000.00, 0.00, now())
              ON CONFLICT (employer_id, insurer_id)
              DO UPDATE SET balance = GREATEST(ea_accounts.balance, 500000.00), updated_at = now();
              SQL
              echo "Seed data inserted successfully (4 insurers)."
