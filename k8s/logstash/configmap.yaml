apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: plum
data:
  logstash.conf: |
    input {
      tcp {
        port => 5000
        codec => json_lines
      }
    }
    filter {
      mutate {
        add_field => { "[@metadata][index_prefix]" => "endorsement-service" }
      }
      date {
        match => [ "timestamp", "ISO8601" ]
        target => "@timestamp"
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "endorsement-logs-%{+YYYY.MM.dd}"
      }
    }
